name: Kinga scraper

on:
  push:
    branches:
      - main
  workflow_dispatch: {}
  schedule:
    - cron: '0 7 * * *'

jobs:
  scrape:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: kinga
          MYSQL_USER: kinga
          MYSQL_PASSWORD: kinga
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Wait for MySQL
        run: |
          for i in {1..12}; do
            if mysqladmin ping -h127.0.0.1 -uroot -proot --silent; then
              echo "MySQL is ready"
              break
            fi
            echo "Waiting for MySQL..."
            sleep 5
          done
      - name: Run scraper
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_USER: kinga
          MYSQL_PASSWORD: kinga
          MYSQL_DATABASE: kinga
        run: python -m src.kinga_scraper.run
